<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event presence dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #020617;
      --card: #0f172a;
      --border: rgba(62, 210, 255, 0.2);
      --accent: #38bdf8;
      --accent2: #a78bfa;
      --text: #f1f5f9;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(56, 189, 248, 0.15), transparent),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(167, 139, 250, 0.12), transparent);
      pointer-events: none;
      z-index: 0;
    }
    .auth-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(2, 6, 23, 0.92);
      backdrop-filter: blur(8px);
    }
    .auth-overlay.is-hidden { display: none; }
    .auth-card {
      width: min(420px, 100%);
      padding: 40px 32px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: linear-gradient(160deg, rgba(15,23,42,0.95), rgba(15,23,42,0.85));
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }
    .auth-card h2 {
      font-size: 1.5rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #fff, var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .auth-card p { color: var(--muted); font-size: 0.9rem; margin-bottom: 20px; }
    .auth-card input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.35);
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 14px;
    }
    .auth-card input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(120deg, var(--accent), var(--accent2));
      color: #020617;
      transition: transform 0.15s, filter 0.15s;
    }
    .btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
    #auth-error { color: #f87171; font-size: 0.9rem; min-height: 22px; margin-top: 10px; }

    #app-shell.is-hidden { display: none; }
    #app-shell { position: relative; z-index: 1; padding: 32px 20px 60px; max-width: 1280px; margin: 0 auto; }

    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header h1 {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    header p { color: var(--muted); margin-top: 8px; }

    .stat {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(15,23,42,0.6);
      margin-bottom: 28px;
      font-variant-numeric: tabular-nums;
    }
    .stat strong { font-size: 1.25rem; color: var(--accent); }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
      justify-content: center;
    }
    .tab {
      padding: 10px 20px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(15,23,42,0.5);
      color: var(--muted);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.25s ease;
    }
    .tab:hover {
      border-color: rgba(56, 189, 248, 0.5);
      color: var(--text);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(56, 189, 248, 0.12);
    }
    .tab.active {
      background: linear-gradient(120deg, rgba(56,189,248,0.25), rgba(167,139,250,0.2));
      border-color: var(--accent);
      color: var(--text);
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 12px;
    }
    .btn-ghost {
      padding: 8px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-ghost:hover { background: rgba(56,189,248,0.1); transform: translateY(-1px); }

    .table-wrap {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(15,23,42,0.4);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }
    th, td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid rgba(62,210,255,0.08);
    }
    th {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      background: rgba(0,0,0,0.25);
    }
    tr:hover td { background: rgba(56,189,248,0.04); }
    td.feedback {
      max-width: 280px;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .mono { font-family: "JetBrains Mono", monospace; font-size: 0.85rem; }
    .dim { color: var(--muted); }

    #loading-row td {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }
    .shimmer {
      display: inline-block;
      width: 120px;
      height: 14px;
      border-radius: 6px;
      background: linear-gradient(90deg, rgba(148,163,184,0.1), rgba(148,163,184,0.25), rgba(148,163,184,0.1));
      background-size: 200% 100%;
      animation: shimmer 1.2s ease-in-out infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    #empty-row td {
      text-align: center;
      padding: 48px;
      color: var(--muted);
    }
    .is-hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
